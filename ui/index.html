<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AudioAssist</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div id="app">

  <!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
  <header id="toolbar">
    <span class="app-title">AudioAssist</span>
    <div class="toolbar-actions">
      <select id="sel-engine" title="ASR engine">
        <option value="qwen">Qwen3-ASR</option>
        <option value="whisper">Whisper</option>
      </select>
    </div>
  </header>

  <!-- ── Main layout (3 columns) ─────────────────────────────────────────── -->
  <main id="main">

    <!-- ── Left: History sidebar ──────────────────────────────────────────── -->
    <nav id="history-panel">
      <div id="history-list"></div>
      <div id="history-footer">
        <button id="btn-upload" class="btn-sidebar">📁 Upload File</button>
        <button id="btn-start-recording" class="btn-sidebar btn-sidebar-record">🎙 Start Recording</button>
      </div>
    </nav>

    <!-- ── Center: player + transcript content ────────────────────────────── -->
    <section id="center-panel">

      <!-- Player bar (shown when a job is loaded) -->
      <div id="player-bar" hidden>
        <div id="player-filename"></div>
        <audio id="audio-el" controls></audio>
        <div id="player-time">00:00 / 00:00</div>
      </div>

      <!-- Empty hint (idle state) -->
      <div id="empty-hint">
        <div class="empty-hint-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M9 19V6l12-3v13"/>
            <circle cx="6" cy="19" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>
        <p class="empty-hint-text">Select a recording from the history,<br>or upload a new file.</p>
      </div>

      <!-- Progress panel (transcribing state) -->
      <div id="progress-panel" hidden>
        <p id="progress-filename"></p>
        <div id="progress-bar-wrap">
          <div id="progress-bar"></div>
        </div>
        <p id="progress-msg">Preparing…</p>
      </div>

      <!-- Transcript (done state) -->
      <div id="transcript-header" hidden>
        <span id="transcript-meta"></span>
        <button id="btn-save" class="btn-save" hidden>Save</button>
        <span id="save-status" class="save-status"></span>
      </div>
      <div id="transcript-list" hidden></div>

      <!-- Realtime panel (realtime state) -->
      <div id="realtime-panel" hidden>
        <div id="realtime-header">
          <span id="realtime-dot" class="realtime-dot"></span>
          <span id="realtime-status" class="realtime-status-text">Idle</span>
        </div>
        <div id="realtime-list"></div>
      </div>

      <!-- Realtime control bar (realtime-rec / realtime-paused states) -->
      <div id="realtime-control-bar" hidden>
        <div class="rc-left">
          <span id="rc-session-name"></span>
        </div>
        <div class="rc-center">
          <span id="rc-timer" class="rc-timer">00:00</span>
          <button id="rc-btn-pause" class="btn-rc" title="Pause / Resume">⏸</button>
          <button id="rc-btn-play"  class="btn-rc" title="Play recording" disabled>▶</button>
        </div>
        <div class="rc-right">
          <button id="rc-btn-finish" class="btn-primary btn-sm">Finish</button>
        </div>
      </div>

    </section>

    <!-- ── Right: Summary panel (collapsible) ─────────────────────────────── -->
    <aside id="summary-panel" hidden>

      <!-- Toggle strip (always visible, 28px wide when collapsed) -->
      <button id="btn-toggle-summary" class="summary-toggle" title="Toggle summary panel">‹</button>

      <!-- Summary content (hidden when collapsed) -->
      <div id="summary-inner">

        <!-- Controls row -->
        <div id="summary-controls">
          <button id="btn-summary-settings" class="btn-icon" title="API settings">⚙</button>
          <select id="sel-template" title="Summary template"></select>
          <button id="btn-summarize" class="btn-primary btn-sm">Generate</button>
        </div>

        <!-- Version switcher -->
        <div id="summary-versions" hidden></div>

        <!-- Output area -->
        <div id="summary-output">
          <div id="summary-placeholder" class="summary-placeholder">
            Summary will appear here
          </div>
          <div id="summary-text" hidden></div>
          <div id="summary-loading" class="summary-loading" hidden>
            <span class="summary-spinner"></span> Generating…
          </div>
        </div>

        <!-- API config form (collapsible) -->
        <div id="summary-config" hidden>
          <div class="config-row">
            <label for="cfg-base-url">Base URL</label>
            <input id="cfg-base-url" type="text" placeholder="https://api.openai.com/v1" />
          </div>
          <div class="config-row">
            <label for="cfg-api-key">API Key</label>
            <input id="cfg-api-key" type="password" placeholder="sk-…" />
          </div>
          <div class="config-row">
            <label for="cfg-model">Model</label>
            <input id="cfg-model" type="text" placeholder="gpt-4o-mini" />
          </div>
          <div class="config-actions">
            <button id="btn-save-config" class="btn-primary btn-sm">Save</button>
          </div>

          <div class="config-section-title">Templates
            <button id="btn-add-template" class="btn-link btn-sm">+ Add</button>
          </div>
          <div id="template-list"></div>
        </div>

      </div><!-- /#summary-inner -->

    </aside>

  </main>
</div>

<script src="js/player.js"></script>
<script src="js/transcript.js"></script>
<script src="js/realtime.js"></script>
<script src="js/summary.js"></script>
<script src="js/history.js"></script>
<script src="js/app.js"></script>
</body>
</html>
